# RAViT Configuration for LVIS Zero-shot Detection
model:
  type: "RAViT"
  backbone: "vit_base_patch16_224"
  embed_dim: 768
  num_regions: 300
  top_k: 300
  image_size: 224

train:
  batch_size: 32
  lr: 0.0001
  epochs: 50
  weight_decay: 0.05
  warmup_steps: 2000

dataset:
  name: "lvis"
  root: "./data/lvis"
  num_classes: 1203 # LVIS total categories